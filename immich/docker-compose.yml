services:
  immich:
    image: ghcr.io/imagegenius/immich:openvino
    container_name: immich
    environment:
      # User permission
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jakarta

      # Database
      - DB_HOSTNAME=postgres14
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE_NAME=immich
      - DB_PORT=5432

      # Redis / Valkey
      - REDIS_HOSTNAME=valkey
      - REDIS_PORT=6379
      - REDIS_PASSWORD=

      # Immich server
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080

      # Machine Learning
      - MACHINE_LEARNING_HOST=0.0.0.0
      - MACHINE_LEARNING_PORT=3003
      - MACHINE_LEARNING_WORKERS=1
      - MACHINE_LEARNING_WORKER_TIMEOUT=120

    volumes:
      # App config + ML model cache
      - ./immich/config:/config

      # Main Immich upload/library folder
      - ./immich/photos:/photos

      # Optional external libraries
      - ./immich/libraries:/libraries

      # Required/recommended for OpenVINO access
      - /dev/bus/usb:/dev/bus/usb

    devices:
      # Intel iGPU / OpenVINO / Quick Sync
      - /dev/dri:/dev/dri

    device_cgroup_rules:
      - "c 189:* rmw"

    ports:
      - "8080:8080"

    depends_on:
      - postgres14
      - valkey

    restart: unless-stopped


  valkey:
    image: valkey/valkey:8-bookworm
    container_name: immich_valkey
    volumes:
      - ./immich/valkey:/data
    restart: unless-stopped


  postgres14:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=immich

      # Kalau database disimpan di HDD, uncomment:
      # - DB_STORAGE_TYPE=HDD

    volumes:
      - ./immich/postgres:/var/lib/postgresql/data

    restart: unless-stopped
