services:
  actual_server:
    image: docker.io/actualbudget/actual-server:latest
    container_name: actual-budget
    ports:
      - '5006:5006'
    environment:
      - ACTUAL_HTTPS_KEY=/data/certs/selfhost.key
      - ACTUAL_HTTPS_CERT=/data/certs/selfhost.crt
    volumes:
      - ./actual-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'node src/scripts/health-check.js']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
