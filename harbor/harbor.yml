# Configuration file of Harbor for this host.
# Generated from harbor/harbor.yml.template by render-config.sh.

hostname: harbor.precia.site

http:
  port: 8080

# Harbor will advertise this external HTTPS URL even though the local install
# only binds HTTP behind a reverse proxy on this host.
external_url: https://harbor.precia.site

harbor_admin_password: CHANGE_ME_ADMIN_PASSWORD

database:
  password: CHANGE_ME_DB_PASSWORD
  max_idle_conns: 100
  max_open_conns: 900
  conn_max_lifetime: 5m
  conn_max_idle_time: 0

data_volume: /srv/precia/infra/harbor/data

trivy:
  ignore_unfixed: false
  skip_update: false
  skip_java_db_update: false
  db_repository: ghcr.io/aquasecurity/trivy-db
  java_db_repository: ghcr.io/aquasecurity/trivy-java-db
  offline_scan: false
  security_check: vuln
  insecure: false
  timeout: 5m0s

jobservice:
  max_job_workers: 10
  max_job_duration_hours: 24
  job_loggers:
    - STD_OUTPUT
    - FILE
  logger_sweeper_duration: 1 #days

notification:
  webhook_job_max_retry: 3
  webhook_job_http_client_timeout: 3 #seconds

log:
  level: info
  local:
    rotate_count: 50
    rotate_size: 200M
    location: /srv/precia/infra/harbor/log

proxy:
  http_proxy: 
  https_proxy: 
  no_proxy: 127.0.0.1,localhost,core,registry,jobservice,db,redis,harbor-portal,proxy,harbor-proxy,harbor.precia.site
  components:
    - core
    - jobservice
    - trivy

_version: 2.15.0
