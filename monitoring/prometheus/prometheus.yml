global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 192.168.1.104:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - 192.168.1.100:9100
          - 192.168.1.4:9100
          - 192.168.1.5:9100
          - 192.168.1.102:9100
          - 192.168.1.103:9100
          - 192.168.1.104:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - 192.168.1.100:18080
          - 192.168.1.4:18080
          - 192.168.1.5:18080
          - 192.168.1.102:18080
          - 192.168.1.103:18080
          - 192.168.1.104:18080