services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    environment:
      SECRET_ENCRYPTION_KEY: "${SECRET_ENCRYPTION_KEY}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - homarr-data:/appdata
    ports:
      - "7575:7575"

volumes:
  homarr-data:
